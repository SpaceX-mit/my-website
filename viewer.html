<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档查看器 - Felix's Tech Blog</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/viewer.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><a href="index.html">Felix</a></div>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="blog.html">博客</a></li>
      <li><a href="projects.html">项目</a></li>
      <li><a href="products.html">产品</a></li>
      <li><a href="ideas.html">Ideas</a></li>
    </ul>
    <button class="nav-toggle" onclick="toggleNav()">☰</button>
  </nav>

  <div class="viewer-layout">
    <aside class="toc-sidebar" id="toc">
      <div class="toc-header">目录</div>
      <nav id="toc-nav"></nav>
    </aside>

    <main class="viewer-main">
      <div class="viewer-toolbar">
        <button onclick="history.back()" class="btn btn-sm btn-outline">← 返回</button>
        <span id="file-path-display" class="file-path"></span>
        <button onclick="toggleToc()" class="btn btn-sm btn-outline">目录</button>
      </div>
      <article class="markdown-body" id="content">
        <div class="loading">加载中...</div>
      </article>
    </main>
  </div>

  <footer class="footer">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <p>© 2026 Felix · Built with ❤️</p>
    <p class="site-stats">
      本页阅读量 <span id="busuanzi_value_page_pv">--</span> 次 &nbsp;|&nbsp;
      本站访客数 <span id="busuanzi_value_site_uv">--</span> 人
    </p>
  </footer>

  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <!-- highlight.js for code highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/highlight.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/viewer.js"></script>
</body>
</html>
